trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  terraformVersion: '1.6.6'

# =========================
# DEV PLAN STAGE
# =========================
- stage: TerraformPlanDev
  displayName: "Terraform Plan - DEV"
  variables:
    workingDir: 'environments/dev'
  jobs:
  - job: planDev
    steps:
    - checkout: self
      clean: true

    - task: TerraformInstaller@1
      displayName: Install Terraform
      inputs:
        terraformVersion: $(terraformVersion)

    - task: TerraformTaskV4@4
      displayName: Terraform Init (DEV)
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: $(workingDir)
        backendServiceArm: 'azure-connection'
        backendAzureRmResourceGroupName: 'demo-aks'
        backendAzureRmStorageAccountName: 'tfstateaksdevdheepu143'
        backendAzureRmContainerName: 'demo'
        backendAzureRmKey: 'aks.tfstate'

    - task: TerraformTaskV4@4
      displayName: Terraform Validate (DEV)
      inputs:
        provider: 'azurerm'
        command: 'validate'
        workingDirectory: $(workingDir)

    - task: TerraformTaskV4@4
      displayName: Terraform Plan (DEV)
      inputs:
        provider: 'azurerm'
        command: 'plan'
        workingDirectory: $(workingDir)
        environmentServiceNameAzureRM: 'azure-connection'
        commandOptions: '-var-file=dev.tfvars -out=tfplan'

    - task: PublishPipelineArtifact@1
      displayName: Publish DEV tfplan
      inputs:
        targetPath: '$(workingDir)/tfplan'
        artifact: dev-tfplan


# =========================
# DEV APPLY STAGE
# =========================
- stage: TerraformApplyDev
  displayName: "Terraform Apply - DEV"
  dependsOn: TerraformPlanDev
  condition: succeeded()
  variables:
    workingDir: 'environments/dev'
  jobs:
  - job: applyDev
    steps:
    - checkout: self
      clean: true

    - task: TerraformInstaller@1
      displayName: Install Terraform
      inputs:
        terraformVersion: $(terraformVersion)

        # Terraform Init
        - task: TerraformTaskV4@4
          displayName: 'Terraform Init'
          inputs:
            provider: 'azurerm'
            command: 'init'
            workingDirectory: $(workingDir)
            backendServiceArm: $(serviceConnection)
            backendAzureRmResourceGroupName: 'demo-aks'
            backendAzureRmStorageAccountName: 'tfstateaksdevdheepu143'
            backendAzureRmContainerName: 'demo'
            backendAzureRmKey: 'dev.terraform.tfstate'

    - task: DownloadPipelineArtifact@2
      displayName: Download DEV tfplan
      inputs:
        artifact: dev-tfplan
        path: $(workingDir)

        # Terraform Apply
        - task: TerraformTaskV4@4
          displayName: 'Terraform Apply'
          inputs:
            provider: 'azurerm'
            command: 'apply'
            workingDirectory: $(workingDir)
            environmentServiceNameAzureRM: $(serviceConnection)
            commandOptions: 'tfplan'