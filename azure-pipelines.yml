trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  terraformVersion: '1.6.6'

stages:

# ============================================================
# ======================= DEV SECTION =========================
# ============================================================

# =========================
# DEV PLAN STAGE
# =========================
- stage: TerraformPlan
  displayName: Terraform Plan
  variables:
    workingDir: 'environments/dev'
  jobs:
  - job: plan
    steps:
    - checkout: self
      clean: true

    - task: TerraformInstaller@1
      displayName: Install Terraform
      inputs:
        terraformVersion: $(terraformVersion)

    - task: TerraformTaskV4@4
      displayName: Terraform Init
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: $(workingDir)
        backendServiceArm: 'azure-connection'
        backendAzureRmResourceGroupName: 'demo-aks'
        backendAzureRmStorageAccountName: 'tfstateaksdevdheepu143'
        backendAzureRmContainerName: 'demo'
        backendAzureRmKey: 'dev.terraform.tfstate'

    - task: TerraformTaskV4@4
      displayName: Terraform Validate
      inputs:
        provider: 'azurerm'
        command: 'validate'
        workingDirectory: $(workingDir)

    - task: TerraformTaskV4@4
      displayName: Terraform Plan
      inputs:
        provider: 'azurerm'
        command: 'plan'
        workingDirectory: $(workingDir)
        environmentServiceNameAzureRM: 'azure-connection'
        commandOptions: '-var-file=dev.tfvars -out=tfplan'

    - task: PublishPipelineArtifact@1
      displayName: Publish tfplan
      inputs:
        targetPath: '$(workingDir)/tfplan'
        artifact: tfplan


# =========================
# DEV APPLY STAGE
# =========================
- stage: TerraformApply
  displayName: Terraform Apply
  dependsOn: TerraformPlan
  condition: succeeded()
  variables:
    workingDir: 'environments/dev'
  jobs:
    - job: apply
      displayName: 'Terraform Apply'
      steps:
        - checkout: self
          clean: true

        - task: TerraformInstaller@1
          displayName: Install Terraform
          inputs:
            terraformVersion: $(terraformVersion)

        - task: TerraformTaskV4@4
          displayName: Terraform Init
          inputs:
            provider: 'azurerm'
            command: 'init'
            workingDirectory: $(workingDir)
            backendServiceArm: 'azure-connection'
            backendAzureRmResourceGroupName: 'demo-aks'
            backendAzureRmStorageAccountName: 'tfstateaksdevdheepu143'
            backendAzureRmContainerName: 'demo'
            backendAzureRmKey: 'dev.terraform.tfstate'

        - task: DownloadPipelineArtifact@2
          displayName: Download tfplan
          inputs:
            buildType: 'current'
            artifact: tfplan
            path: $(workingDir)

        - task: TerraformTaskV4@4
          displayName: Terraform Apply
          inputs:
            provider: 'azurerm'
            command: 'apply'
            workingDirectory: $(workingDir)
            environmentServiceNameAzureRM: 'azure-connection'
            commandOptions: 'tfplan'


# ============================================================
# ======================= PROD SECTION ========================
# ============================================================

# =========================
# PROD PLAN STAGE
# =========================
- stage: TerraformPlanProd
  displayName: "Terraform Plan - PROD"
  dependsOn: TerraformApply
  condition: succeeded()
  variables:
    workingDir: 'environments/prod'
  jobs:
  - job: planProd
    steps:
    - checkout: self
      clean: true

    - task: TerraformInstaller@1
      displayName: Install Terraform
      inputs:
        terraformVersion: $(terraformVersion)

    - task: TerraformTaskV4@4
      displayName: Terraform Init (PROD)
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: $(workingDir)
        backendServiceArm: 'azure-connection'
        backendAzureRmResourceGroupName: 'demo-aks'
        backendAzureRmStorageAccountName: 'tfstateaksproddheepu143'
        backendAzureRmContainerName: 'demo'
        backendAzureRmKey: 'prod.terraform.tfstate'

    # ⭐ FIX: Force correct working directory before plan
    - script: cd $(workingDir)
      displayName: "Change directory to PROD"

    - task: TerraformTaskV4@4
      displayName: Terraform Plan (PROD)
      inputs:
        provider: 'azurerm'
        command: 'plan'
        workingDirectory: $(workingDir)
        environmentServiceNameAzureRM: 'azure-connection'
        commandOptions: '-var-file=prod.tfvars -out=tfplan'

    - task: PublishPipelineArtifact@1
      displayName: Publish PROD tfplan
      inputs:
        targetPath: '$(workingDir)/tfplan'
        artifact: prod-tfplan


# =========================
# PROD APPLY STAGE (WITH APPROVAL)
# =========================
- stage: TerraformApplyProd
  displayName: "Terraform Apply - PROD"
  dependsOn: TerraformPlanProd
  condition: succeeded()
  variables:
    workingDir: 'environments/prod'
  jobs:
  - deployment: applyProd
    displayName: "Terraform Apply - PROD"
    environment: "prod"
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self
            clean: true

          - task: TerraformInstaller@1
            displayName: Install Terraform
            inputs:
              terraformVersion: $(terraformVersion)

          - task: TerraformTaskV4@4
            displayName: Terraform Init (PROD)
            inputs:
              provider: 'azurerm'
              command: 'init'
              workingDirectory: $(workingDir)
              backendServiceArm: 'azure-connection'
              backendAzureRmResourceGroupName: 'demo-aks'
              backendAzureRmStorageAccountName: 'tfstateaksproddheepu143'
              backendAzureRmContainerName: 'demo'
              backendAzureRmKey: 'prod.terraform.tfstate'

          - task: DownloadPipelineArtifact@2
            displayName: Download PROD tfplan
            inputs:
              buildType: 'current'
              artifact: prod-tfplan
              path: $(workingDir)

          - task: TerraformTaskV4@4
            displayName: Terraform Apply (PROD)
            inputs:
              provider: 'azurerm'
              command: 'apply'
              workingDirectory: $(workingDir)
              environmentServiceNameAzureRM: 'azure-connection'
              commandOptions: 'tfplan'